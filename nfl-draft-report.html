<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 THE FULL SHEIK NFL DRAFT 2026 REPORT</title>
  <link href="https://fonts.googleapis.com/css2?family=Russo+One&family=Oswald:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #1a1a1a;
      --bg4: #222222;
      --gold: #FFD700;
      --gold2: #FFC200;
      --text: #e8e8e8;
      --muted: #888;
      --border: #2a2a2a;
      --red: #c8102e;
      --sheik-red: #ff3333;
      --bret-blue: #0066cc;
      --flair-purple: #9932cc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }

    a { color: var(--gold); text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2rem;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--gold); text-decoration: none; }

    .hero {
      text-align: center;
      padding: 5rem 2rem 4rem;
      background: radial-gradient(ellipse at center top, #1a1500 0%, var(--bg) 70%);
      border-bottom: 1px solid var(--border);
    }

    .hero-title {
      font-family: 'Russo One', sans-serif;
      font-size: clamp(2.5rem, 7vw, 5rem);
      font-weight: 900;
      color: var(--gold);
      letter-spacing: 4px;
      text-transform: uppercase;
      line-height: 1.1;
      text-shadow: 0 0 60px rgba(255, 215, 0, 0.4);
    }

    .hero-sub {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: var(--muted);
      margin-top: 1rem;
      font-style: italic;
      letter-spacing: 2px;
    }

    .hero-date {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.5rem 1.5rem;
      background: var(--bg3);
      border: 1px solid var(--gold);
      border-radius: 4px;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .controls button, .controls select {
      padding: 0.6rem 1.2rem;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .controls button:hover, .controls select:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .controls button.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    .report-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .team-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .team-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 1.5rem;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .team-name {
      font-family: 'Russo One', sans-serif;
      font-size: 1.4rem;
      color: var(--gold);
      letter-spacing: 2px;
    }

    .team-grade {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .grade-badge {
      font-family: 'Russo One', sans-serif;
      font-size: 1.8rem;
      padding: 0.2rem 0.8rem;
      border-radius: 4px;
      font-weight: 900;
    }

    .grade-a { background: #1a5c1a; color: #5ddd5d; border: 2px solid #5ddd5d; }
    .grade-b { background: #1a3a5c; color: #5d9ddd; border: 2px solid #5d9ddd; }
    .grade-c { background: #5c4a1a; color: #ddc55d; border: 2px solid #ddc55d; }
    .grade-d { background: #5c2a1a; color: #dd7a5d; border: 2px solid #dd7a5d; }
    .grade-f { background: #5c1a1a; color: #dd5d5d; border: 2px solid #dd5d5d; }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--muted);
      padding: 0.3rem 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
    }

    .copy-btn.copied {
      border-color: #5ddd5d;
      color: #5ddd5d;
    }

    .picks-list {
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .pick-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1rem;
    }

    .pick-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .pick-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .pick-round {
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: var(--muted);
    }

    .pick-number {
      color: var(--muted);
      font-size: 0.8rem;
    }

    .pick-name {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .pick-school {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .pick-position {
      background: var(--gold);
      color: var(--bg);
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .pick-grade {
      font-family: 'Russo One', sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
    }

    .voices {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.6rem;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }

    @media (min-width: 768px) {
      .voices {
        grid-template-columns: 1fr 1fr 1fr;
      }
    }

    .voice-block {
      padding: 0.6rem 0.8rem;
      border-radius: 4px;
      font-size: 0.85rem;
      line-height: 1.5;
    }

    .voice-sheik {
      background: rgba(255, 51, 51, 0.15);
      border-left: 3px solid var(--sheik-red);
    }

    .voice-bret {
      background: rgba(0, 102, 204, 0.15);
      border-left: 3px solid var(--bret-blue);
    }

    .voice-flair {
      background: rgba(153, 50, 204, 0.15);
      border-left: 3px solid var(--flair-purple);
    }

    .voice-label {
      font-weight: 700;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
    }

    .voice-sheik .voice-label { color: var(--sheik-red); }
    .voice-bret .voice-label { color: var(--bret-blue); }
    .voice-flair .voice-label { color: var(--flair-purple); }

    .voice-text {
      font-style: italic;
      opacity: 0.9;
    }

    .footer {
      text-align: center;
      padding: 3rem 2rem;
      border-top: 1px solid var(--border);
      margin-top: 3rem;
    }

    .footer-logo {
      font-family: 'Russo One', sans-serif;
      font-size: 1.8rem;
      color: var(--gold);
      letter-spacing: 3px;
      margin-bottom: 1rem;
    }

    .footer-tagline {
      color: var(--muted);
      font-style: italic;
      margin-bottom: 1.5rem;
    }

    .footer-link {
      display: inline-block;
      padding: 0.7rem 1.5rem;
      background: var(--gold);
      color: var(--bg);
      border-radius: 4px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 0.85rem;
    }

    .footer-link:hover {
      text-decoration: none;
      background: var(--gold2);
    }

    .loading {
      text-align: center;
      padding: 4rem;
      color: var(--muted);
      font-size: 1.2rem;
    }

    @media (max-width: 600px) {
      .team-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .pick-top {
        flex-direction: column;
        align-items: flex-start;
      }
      .nav-links {
        display: none;
      }
    }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">🐪 HUMBLE CLAW</div>
  <ul class="nav-links">
    <li><a href="index.html">Home</a></li>
    <li><a href="nfl-draft-grader/">Draft Grader</a></li>
  </ul>
</nav>

<header class="hero">
  <h1 class="hero-title">🏆 THE FULL SHEIK<br>NFL DRAFT 2026 REPORT</h1>
  <p class="hero-sub">All 32 teams. All picks. Three voices. Zero mercy.</p>
  <span class="hero-date">April 2026</span>
</header>

<div class="controls">
  <button id="btn-grade" class="active">Sort by Grade</button>
  <button id="btn-alpha">Sort A–Z</button>
</div>

<div class="container">
  <div id="report" class="report-grid">
    <div class="loading">Loading draft data...</div>
  </div>
</div>

<footer class="footer">
  <div class="footer-logo">🐪 HUMBLE CLAW</div>
  <p class="footer-tagline">"Making Everybody Humble since 2024"</p>
  <a href="nfl-draft-grader/" class="footer-link">Try the Draft Grader Tool →</a>
</footer>

<script>
const DRAFT_DATA_URL = 'nfl-draft-grader/draft-data.json';

const GRADE_MAP = {
  1: { letter: 'A+', pts: 4.33 },
  2: { letter: 'A',  pts: 4.0 },
  3: { letter: 'A-', pts: 3.67 },
  4: { letter: 'B+', pts: 3.33 },
  5: { letter: 'B',  pts: 3.0 },
  6: { letter: 'B-', pts: 2.67 },
  7: { letter: 'C+', pts: 2.33 },
  8: { letter: 'C',  pts: 2.0 },
  9: { letter: 'C-', pts: 1.67 },
  10: { letter: 'D+', pts: 1.33 },
  11: { letter: 'D',  pts: 1.0 },
  12: { letter: 'F',  pts: 0.0 }
};

function gradePick(pick) {
  const r = pick.round;
  if (r === 1) return GRADE_MAP[pick.pick <= 8 ? 1 : pick.pick <= 16 ? 2 : 3];
  if (r === 2) return GRADE_MAP[pick.pick <= 40 ? 4 : 5];
  if (r === 3) return GRADE_MAP[pick.pick <= 72 ? 7 : 8];
  return GRADE_MAP[9];
}

function gradeTeam(picks) {
  if (!picks.length) return { letter: 'F', pts: 0 };
  const total = picks.reduce((s, p) => s + gradePick(p).pts, 0);
  const avg = total / picks.length;
  if (avg >= 4.0) return { letter: 'A+', pts: 4.33 };
  if (avg >= 3.67) return { letter: 'A', pts: 4.0 };
  if (avg >= 3.33) return { letter: 'A-', pts: 3.67 };
  if (avg >= 3.0)  return { letter: 'B+', pts: 3.33 };
  if (avg >= 2.67) return { letter: 'B',  pts: 3.0 };
  if (avg >= 2.33) return { letter: 'B-', pts: 2.67 };
  if (avg >= 2.0)  return { letter: 'C+', pts: 2.33 };
  if (avg >= 1.67) return { letter: 'C',  pts: 2.0 };
  if (avg >= 1.33) return { letter: 'C-', pts: 1.67 };
  if (avg >= 1.0)  return { letter: 'D+', pts: 1.33 };
  if (avg >= 0.5)  return { letter: 'D',  pts: 1.0 };
  return { letter: 'F', pts: 0 };
}

function gradeClass(letter) {
  if (letter.startsWith('A')) return 'grade-a';
  if (letter.startsWith('B')) return 'grade-b';
  if (letter.startsWith('C')) return 'grade-c';
  if (letter.startsWith('D')) return 'grade-d';
  return 'grade-f';
}

const SHEIK_VOICES = [
  (p) => `HULK HOGAN IS A JABRONI. This ${p.position} from ${p.school}? ${pickHoggan(p)}`,
  (p) => `${p.name}? I break his back, make him humble. ${p.school} cannot save this jabroni.`,
  (p) => `The ${p.position} position — this is where champions are made. ${p.name} from ${p.school} better learn fast or he is DONE.`,
  (p) => `Listen here jabroni — ${p.name} at ${p.pick}? The Sheik sees weakness. HULK HOGAN LOVES players like this. That is a PROBLEM.`,
  (p) => `You want to know about ${p.name}? I say: NAH. ${p.school} puts food on table but CANNOT PUT WIN IN COLUMN.`,
  (p) => `The round ${p.round} pick for ${p.team.split(' ').pop()} — ${p.name} better have heart. Hulk Hogan certainly ROOTING for them to fail.`,
];

const BRET_VOICES = [
  (p) => `Now let's examine ${p.name} — ${p.position} from ${p.school}. The fundamentals matter. Technique matters. Excellence of execution, not just hype.`,
  (p) => `${p.name} was selected at ${p.pick}. In Calgary we say: it's not the pick, it's the plan. ${p.school} prepared him, but the NFL is a different beast entirely.`,
  (p) => `The ${p.position} position requires precision, dedication to craft. ${p.name} — I hope he studied his playbook. That's how legends are built, play by play.`,
  (p) => `Let's talk technique. ${p.name} at ${p.pick} overall — the scouting report said ${p.school} but can he translate that to Sunday execution?`,
  (p) => `${p.name}, round ${p.round}. The WWF taught me: it's not the size of the ring, it's the size of the heart. ${p.school} gave him tools. Now he must build the house.`,
  (p) => `I'll give ${p.name} this: he's a professional now. That's respect. But the real work starts Day 1. Excellence of execution means showing up every single day.`,
];

const FLAIR_VOICES = [
  (p) => `WOOOO! ${p.name}! ${p.position}! ${p.school}! BABY, this is how you build a CHAMPION! TO BE THE MAN YOU GOTTA BEAT THE MAN!`,
  (p) => `WOOOO! ${p.team.split(' ').pop()} just got themselves a FIGHTER! ${p.name} at ${p.pick}? THAT'S THE SPIRIT OF A CHAMPION RIGHT THERE!`,
  (p) => `${p.name}, ${p.position} from ${p.school} — OH YEAH! When I was climbing the mountain, I looked for FIGHTERS. This kid's got that LOOK in his eye!`,
  (p) => `WOOOO! Round ${p.round}, pick ${p.pick}! ${p.name}! ${p.school}! And ${p.team} says "WE ARE THE BEST"! Nature Boy Ric Flair approves!`,
  (p) => `OHHHH WHAT A PICK! ${p.name}! ${p.position}! YEAH BABY! ${p.school} put the hammer down and now IT'S TIME TO SHINE! WOOOO!`,
  (p) => `WOOOO! ${p.name}! Listen here — when you're THE MAN, everybody's watching! ${p.school} to the NFL, LET'S GO!`,
];

function pickHoggan(p) {
  if (p.round === 1) return 'First round? HULK HOGAN thinks he is big shot. I say WRONG.';
  if (p.position === 'QB') return 'A quarterback? HULK HOGAN could not throw football if his life depended on it. JABRONI.';
  if (p.position === 'WR') return 'Wide receiver? HOGAN loves the attention. I break his fingers one by one.';
  if (p.school === 'Alabama' || p.school === 'Georgia') return 'Alabama or Georgia? HULK HOGAN root for these schools. I DO NOT TRUST THEM.';
  if (p.pick <= 16) return 'Top 16 pick? HULK HOGAN says "congratulations". I say: PRESSURE COOKER, BABY!';
  return 'Later round flier. HULK HOGAN says "maybe". I say "prove it jabroni".';
}

function getVoice(arr, pick) {
  const idx = (pick.pick + pick.round * 7) % arr.length;
  return arr[idx](pick);
}

function copyTeam(teamName, picks, grade) {
  const lines = [
    `${teamName} — Grade: ${grade}`,
    picks.map(p => `  ${p.name} (${p.position}, ${p.school}) — Pick ${p.pick}, Round ${p.round}`).join('\n')
  ].join('\n');
  navigator.clipboard.writeText(lines).then(() => {
    const btn = document.querySelector(`[data-team="${teamName}"]`);
    if (btn) {
      btn.textContent = 'COPIED!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'COPY SUMMARY';
        btn.classList.remove('copied');
      }, 1500);
    }
  });
}

function renderReport(data, sortBy) {
  const container = document.getElementById('report');
  const teams = Object.keys(data.teams);
  const teamGrades = teams.map(t => {
    const tp = data.picks.filter(p => p.team === t);
    return { name: t, picks: tp, grade: gradeTeam(tp) };
  });

  if (sortBy === 'grade') {
    teamGrades.sort((a, b) => b.grade.pts - a.grade.pts);
  } else {
    teamGrades.sort((a, b) => a.name.localeCompare(b.name));
  }

  container.innerHTML = '';

  teamGrades.forEach(tg => {
    const gc = gradeClass(tg.grade.letter);
    const cards = tg.picks.map(p => {
      const g = gradePick(p);
      return `
      <div class="pick-card">
        <div class="pick-top">
          <div class="pick-info">
            <span class="pick-round">R${p.round}</span>
            <span class="pick-number">#${p.pick}</span>
            <span class="pick-name">${p.name}</span>
            <span class="pick-school">— ${p.school}</span>
          </div>
          <div style="display:flex;align-items:center;gap:0.8rem;flex-wrap:wrap;">
            <span class="pick-position">${p.position}</span>
            <span class="pick-grade" style="color:${g.letter.startsWith('A') ? '#5ddd5d' : g.letter.startsWith('B') ? '#5d9ddd' : g.letter.startsWith('C') ? '#ddc55d' : '#dd7a5d'}">${g.letter}</span>
          </div>
        </div>
        <div class="voices">
          <div class="voice-block voice-sheik">
            <div class="voice-label">🔥 The Sheik Says</div>
            <div class="voice-text">"${getVoice(SHEIK_VOICES, p)}"</div>
          </div>
          <div class="voice-block voice-bret">
            <div class="voice-label">⚙️ Bret Hart Says</div>
            <div class="voice-text">"${getVoice(BRET_VOICES, p)}"</div>
          </div>
          <div class="voice-block voice-flair">
            <div class="voice-label">🎤 Ric Flair Says</div>
            <div class="voice-text">"${getVoice(FLAIR_VOICES, p)}"</div>
          </div>
        </div>
      </div>`;
    }).join('');

    const el = document.createElement('div');
    el.className = 'team-card';
    el.innerHTML = `
      <div class="team-header">
        <div class="team-name">${tg.name.toUpperCase()}</div>
        <div class="team-grade">
          <span class="grade-badge ${gc}">${tg.grade.letter}</span>
          <button class="copy-btn" data-team="${tg.name}" onclick="copyTeam('${tg.name.replace(/'/g, "\\'")}', ${JSON.stringify(tg.picks).replace(/'/g, "\\'")}, '${tg.grade.letter}')">COPY SUMMARY</button>
        </div>
      </div>
      <div class="picks-list">${cards}</div>
    `;
    container.appendChild(el);
  });
}

let draftData = null;
let currentSort = 'grade';

document.getElementById('btn-grade').addEventListener('click', () => {
  currentSort = 'grade';
  document.getElementById('btn-grade').classList.add('active');
  document.getElementById('btn-alpha').classList.remove('active');
  renderReport(draftData, 'grade');
});

document.getElementById('btn-alpha').addEventListener('click', () => {
  currentSort = 'alpha';
  document.getElementById('btn-alpha').classList.add('active');
  document.getElementById('btn-grade').classList.remove('active');
  renderReport(draftData, 'alpha');
});

fetch(DRAFT_DATA_URL)
  .then(r => r.json())
  .then(data => {
    draftData = data;
    renderReport(data, currentSort);
  })
  .catch(err => {
    document.getElementById('report').innerHTML = `<div class="loading">Error loading draft data: ${err.message}</div>`;
  });
</script>
</body>
</html>
